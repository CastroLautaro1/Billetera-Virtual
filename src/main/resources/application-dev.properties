# Conexion a Postgre Local (Usamos variables de entorno con valores por defecto)
spring.datasource.url=jdbc:postgresql://localhost:5432/banco_hexagonal
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Configuración de la conexión a la base de datos para que hibernate respete los nombres de las tablas y columnas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT y Credenciales
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
ADMIN_EMAIL=admin@admin.com
ADMIN_PASSWORD=Admin123

# Configuración de Caché
spring.cache.cache-names=user_sessions
spring.cache.caffeine.spec=expireAfterWrite=10m,maximumSize=500

#Spring Batch
spring.batch.jdbc.initialize-schema=always